version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eng-agilium-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - eng_agilium_mssql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  eng_agilium_mssql_data:
